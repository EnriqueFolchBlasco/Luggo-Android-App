name: luggo
description: "You're favourite movings app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^3.12.1  # Update firebase_core to a version compatible with firebase_auth
  firebase_auth: ^5.0.0    # Keep this version as it's compatible with firebase_core ^3.12.1
  cloud_firestore: ^5.6.5  # Cloud Firestore (if you're using Firestore)
  firebase_storage: ^12.4.4 # Firebase Storage (if you're using storage)
  email_validator: ^2.0.1
  shared_preferences: ^2.0.6 
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/Luggo BN.png
    - assets/LuggoColor.png
    - assets/Luggo Icono BN.png
    - assets/LuggoIconoColor.png
    - assets/Luggo_Baseline BN 1.png
    - assets/Luggo_Baseline BN.png
    - assets/Luggo_Baseline Color 1.png
    - assets/Luggo_Baseline Color 1_2.png
    - assets/Luggo_Baseline Color.png
    - assets/Luggo_Baseline2.PNG
