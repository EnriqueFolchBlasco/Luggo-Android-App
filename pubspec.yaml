name: luggo
description: "You're favourite movings app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.12.1
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  email_validator: ^2.0.1
  shared_preferences: ^2.0.6 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/Luggo BN.png
    - assets/LuggoColor.png
    - assets/Luggo Icono BN.png
    - assets/LuggoIconoColor.png
    - assets/LuggoColor2.png
    - assets/Luggo_Baseline BN 1.png
    - assets/Luggo_Baseline BN.png
    - assets/Luggo_Baseline Color 1.png
    - assets/Luggo_Baseline Color 1_2.png
    - assets/Luggo_Baseline Color.png
    - assets/Luggo_Baseline2.PNG

  fonts:
    - family: ClashDisplay
      fonts:
        - asset: assets/fonts/clashDisplay/ClashDisplay-Extralight.otf
          weight: 200
        - asset: assets/fonts/clashDisplay/ClashDisplay-Light.otf
          weight: 300
        - asset: assets/fonts/clashDisplay/ClashDisplay-Regular.otf
          weight: 400
        - asset: assets/fonts/clashDisplay/ClashDisplay-Medium.otf
          weight: 500
        - asset: assets/fonts/clashDisplay/ClashDisplay-Semibold.otf
          weight: 600
        - asset: assets/fonts/clashDisplay/ClashDisplay-Bold.otf
          weight: 700

    - family: Helvetica
      fonts:
        - asset: assets/fonts/helvetica/Helvetica.ttf
          weight: 400
        - asset: assets/fonts/helvetica/Helvetica-Light.ttf
          weight: 300
        - asset: assets/fonts/helvetica/Helvetica-Bold.ttf
          weight: 700
        - asset: assets/fonts/helvetica/Helvetica-Oblique.ttf
          style: italic
          weight: 400
        - asset: assets/fonts/helvetica/Helvetica-BoldOblique.ttf
          style: italic
          weight: 700





flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/LuggoIconoColor.png"
